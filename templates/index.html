<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Detector</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: Arial, sans-serif;
        }

        .card {
            border-radius: 20px;
            padding: 30px;
            background: #ffffff10;
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            width: 400px;
        }

        input {
            border-radius: 10px !important;
            padding: 10px;
        }

        .btn-custom {
            border-radius: 10px;
            font-weight: bold;
        }

        .safe {
            color: #00ff88;
        }

        .danger {
            color: #ff4d4d;
        }

        .progress {
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-safe {
            background-color: #00ff88;
        }

        .progress-bar-danger {
            background-color: #ff4d4d;
        }
    </style>
</head>
<body>

<div class="card text-center">

    <h2>🔐 Phishing URL Detector</h2>
    <p>Check if a URL is safe or malicious</p>

    <form action="/predict" method="post">
        <input 
            type="text" 
            name="url" 
            class="form-control mt-3" 
            placeholder="Enter URL..."
            required
        >

        <button type="submit" class="btn btn-primary mt-3 w-100 btn-custom">
            🔍 Check URL
        </button>
    </form>

    <!-- Result Section -->
    {% if prediction_text %}
        <h4 class="mt-4 
        {% if 'Safe' in prediction_text %}
            safe
        {% else %}
            danger
        {% endif %}
        ">
            {{ prediction_text }}
        </h4>

        <p class="mt-2">Confidence: <strong>{{ confidence }}%</strong></p>
        <p>{{ level }}</p>

        <!-- Progress Bar -->
        <div class="progress mt-3">
            <div class="progress-bar 
                {% if 'Safe' in prediction_text %}
                    progress-bar-safe
                {% else %}
                    progress-bar-danger
                {% endif %}
            " 
            style="width: {{ confidence }}%">
                {{ confidence }}%
            </div>
        </div>
    {% endif %}

</div>

</body>
</html>
